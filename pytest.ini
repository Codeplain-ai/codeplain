[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
# Ignore test data directory (contains fixture files, not actual tests).
# e2e is excluded from default discovery because it requires Docker and a live
# CODEPLAIN_API_KEY; the CI workflow runs it explicitly via `pytest tests/e2e/`.
norecursedirs = tests/data tests/e2e
